name: Tests

# Fast feedback on every push / PR to main: lint for real errors + run the suite.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest ruff
      - name: Ruff — critical errors (gate)
        run: ruff check --select E9,F63,F7,F82,F821,F811 rphe tests packaging
      - name: Ruff — full lint (advisory)
        run: ruff check rphe || true
      - name: Pytest
        run: pytest -q
