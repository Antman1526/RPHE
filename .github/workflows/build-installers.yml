name: Build installers (.dmg + .exe)

# Builds the macOS .dmg and the Windows .exe on native runners (PyInstaller
# cannot cross-compile). Runs on tags like v0.2.0 and attaches both installers
# to the GitHub Release; also uploadable as artifacts on manual runs.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach files to a release

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # setup-python ships a Tk-enabled build
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller typer rich PyYAML keyring
      - name: Verify Tk
        run: python -c "import tkinter; print('Tk', tkinter.TkVersion)"
      - name: Build .app + .dmg
        run: |
          python -m PyInstaller --noconfirm packaging/rphe_gui.spec
          test -d dist/RPHE.app
          rm -rf dist/dmg && mkdir -p dist/dmg
          cp -R dist/RPHE.app dist/dmg/RPHE.app
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname RPHE -srcfolder dist/dmg -ov -format UDZO dist/RPHE.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: RPHE-macos-dmg
          path: dist/RPHE.dmg
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RPHE.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller typer rich PyYAML keyring
      - name: Verify Tk
        run: python -c "import tkinter; print('Tk', tkinter.TkVersion)"
      - name: Build .exe
        run: python -m PyInstaller --noconfirm packaging/rphe_gui.spec
      - name: Check output
        run: if (-Not (Test-Path dist/RPHE.exe)) { throw "RPHE.exe missing" }
      - uses: actions/upload-artifact@v4
        with:
          name: RPHE-windows-exe
          path: dist/RPHE.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RPHE.exe
