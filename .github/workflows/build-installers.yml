name: Build installers (.dmg + .exe)

# Builds the macOS .dmg and the Windows .exe on native runners (PyInstaller
# cannot cross-compile). Runs on tags like v0.2.0 and attaches both installers
# to the GitHub Release; also uploadable as artifacts on manual runs.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to attach files to a release

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff
          ruff check --select E9,F63,F7,F82,F821,F811 rphe tests packaging
          pytest -q

  macos:
    needs: test            # don't build installers unless the suite passes
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # setup-python ships a Tk-enabled build
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller typer rich PyYAML keyring customtkinter
          python -m pip install google-api-python-client google-auth-oauthlib msal
      - name: Verify Tk
        run: python -c "import tkinter; print('Tk', tkinter.TkVersion)"
      - name: Fetch Bitwarden CLI
        run: python packaging/fetch_bw.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build .app + .dmg
        run: |
          python -m PyInstaller --noconfirm packaging/rphe_gui.spec
          test -d dist/RPHE.app
          rm -rf dist/dmg && mkdir -p dist/dmg
          cp -R dist/RPHE.app dist/dmg/RPHE.app
          ln -s /Applications dist/dmg/Applications
          hdiutil create -volname RPHE -srcfolder dist/dmg -ov -format UDZO dist/RPHE.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: RPHE-macos-dmg
          path: dist/RPHE.dmg
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RPHE.dmg

  windows:
    needs: test            # don't build installers unless the suite passes
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller typer rich PyYAML keyring customtkinter
          python -m pip install google-api-python-client google-auth-oauthlib msal
      - name: Verify Tk
        run: python -c "import tkinter; print('Tk', tkinter.TkVersion)"
      - name: Fetch Bitwarden CLI
        run: python packaging/fetch_bw.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build .exe
        run: python -m PyInstaller --noconfirm packaging/rphe_gui.spec
      - name: Check output
        run: if (-Not (Test-Path dist/RPHE.exe)) { throw "RPHE.exe missing" }
      - uses: actions/upload-artifact@v4
        with:
          name: RPHE-windows-exe
          path: dist/RPHE.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RPHE.exe

  # Publish SHA-256 checksums so anyone can verify a download wasn't tampered
  # with: `shasum -a 256 -c SHA256SUMS.txt` (macOS) / `CertUtil -hashfile` (Win).
  checksums:
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256SUMS.txt
        run: |
          cd artifacts
          sha256sum RPHE-macos-dmg/RPHE.dmg RPHE-windows-exe/RPHE.exe \
            | sed 's#RPHE-macos-dmg/##; s#RPHE-windows-exe/##' > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/SHA256SUMS.txt
